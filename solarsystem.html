<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solar System Simulation – Planetarium Edition</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
    body { display: flex; flex-direction: row; }
    .controls { background: rgba(10, 10, 15, 0.95); color: #fff; padding: 20px; box-sizing: border-box; z-index: 10; overflow-y: auto; backdrop-filter: blur(15px); }
    #left-controls { width: 320px; box-shadow: 2px 0 20px rgba(0,0,0,1.0); border-right: 1px solid rgba(255,255,255,0.05); }
    #flight-computer { width: 240px; box-shadow: -2px 0 20px rgba(0,0,0,1.0); border-left: 1px solid rgba(255,255,255,0.05); padding: 15px;}
    .control-group { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 15px; }
    .control-group:last-child { border-bottom: none; }
    .group-header { font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; color: #66aaff; margin-bottom: 12px; }
    #sim-container { position: relative; flex: 1; height: 100%; background: radial-gradient(circle at center, #080812 0%, #000000 90%); }
    #simulation, #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #overlay-canvas { pointer-events: none; z-index: 2; }
    #data-panel { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid rgba(100,170,255,0.3); border-radius: 8px; color: #fff; font-family: monospace; font-size: 13px; pointer-events: none; z-index: 5; backdrop-filter: blur(5px); display: none; }
    .dp-title { font-size: 18px; font-weight: bold; color: #66aaff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
    .dp-row { margin-bottom: 5px; } .dp-label { color: #aaa; display: inline-block; width: 110px;}
    .fc-category { font-weight: bold; color: #66aaff; margin-top: 15px; margin-bottom: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
    .fc-btn { background: transparent; border: none; color: #ccc; cursor: pointer; display: block; width: 100%; text-align: left; padding: 4px 0; font-size: 12px; transition: all 0.2s; font-family: inherit;}
    .fc-btn:hover { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.8); transform: translateX(5px);}
    .fc-btn.active { color: #66aaff; font-weight: bold; text-shadow: 0 0 8px rgba(100,170,255,0.8); }
    .hud-element { position: absolute; font-size: 13px; color: #fff; text-shadow: 0px 2px 5px rgba(0,0,0,0.9); z-index: 5; pointer-events: none; }
    #timer { bottom: 45px; left: 20px; font-weight: bold; font-size: 16px; letter-spacing: 1.5px; }
    #scale-readout { bottom: 20px; left: 20px; color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 1px;}
    #jpl-status { top: 20px; right: 20px; color: #ffaa00; font-family: monospace; font-weight: bold; letter-spacing: 1px; }
    label { display: block; margin: 8px 0 4px 0; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px;}
    input[type="range"], input[type="text"] { width: 100%; box-sizing: border-box; margin-bottom: 8px; }
    input[type="text"] { padding: 8px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #66aaff; border-radius: 4px; font-family: inherit; }
    input[type="date"] { width: 100%; padding: 8px; margin-bottom: 8px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #66aaff; border-radius: 4px; font-family: inherit; box-sizing: border-box; color-scheme: dark;}
    button.ui-btn { width: 100%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; text-transform: uppercase; font-size: 11px; letter-spacing: 1.5px; } 
    button.ui-btn:hover { background: rgba(100, 170, 255, 0.2); border-color: #66aaff; box-shadow: 0 0 15px rgba(100, 170, 255, 0.2); }
    .btn-active { background: rgba(0, 150, 136, 0.3) !important; border-color: #009688 !important; }
    .checkbox-label { margin: 8px 0; font-size: 12px; display: flex; align-items: center; cursor: pointer; color: #ccc;} .checkbox-label input { margin-right: 8px; cursor: pointer; }
    #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; justify-content: center; align-items: center; color: #66aaff; font-size: 20px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; transition: opacity 0.5s; }
  </style>
</head>
<body>
  <div id="left-controls" class="controls">
    <div class="control-group">
      <div class="group-header">JPL Small-Body Search</div>
      <input type="text" id="jplSearchInput" placeholder="e.g. Apophis, Halley...">
      <button id="jplSearchBtn" class="ui-btn" style="background: rgba(150, 100, 255, 0.1); border-color: #9966ff;">Fetch Orbit</button>
      <div id="jplSearchStatus" style="font-size: 11px; margin-top: 4px; font-family: monospace;"></div>
    </div>
    <div class="control-group">
      <div class="group-header">Time Machine</div>
      <input type="date" id="datePicker" value="2000-01-01">
      <div style="display: flex; gap: 8px;">
        <button id="jumpDateBtn" class="ui-btn" style="flex: 1;">Jump to Date</button>
        <button id="todayBtn" class="ui-btn" style="flex: 1; background: rgba(100, 170, 255, 0.2); border-color: #66aaff;">Today</button>
      </div>
    </div>
    <div class="control-group">
      <div class="group-header">Time & Optics</div>
      <label for="speed">Time Warp: <span id="speedValue" style="color:#fff;">10.0 Days / Frame</span></label>
      <input type="range" id="speed" min="1" max="1200" step="1" value="240">
      <label for="planetScale">Planet Magnification: <span id="planetScaleValue" style="color:#fff;">1,000x</span></label>
      <input type="range" id="planetScale" min="0" max="100" step="1" value="67">
      <label for="exposure">Global Brightness: <span id="exposureValue" style="color:#fff;">1.5x</span></label>
      <input type="range" id="exposure" min="0.1" max="4.0" step="0.1" value="1.5">
      <button id="pauseSim" class="ui-btn">Pause / Resume</button>
    </div>
    <div class="control-group">
      <div class="group-header">Cosmic Generation</div>
      <label for="asteroidCount">Main Belt Density: <span id="asteroidCountValue" style="color:#fff;">10,000</span></label>
      <input type="range" id="asteroidCount" min="0" max="20000" step="500" value="10000">
      <label for="kuiperCount">Kuiper Belt Density: <span id="kuiperCountValue" style="color:#fff;">8,000</span></label>
      <input type="range" id="kuiperCount" min="0" max="15000" step="500" value="8000">
      <button id="restartSim" class="ui-btn" style="background: rgba(0, 200, 150, 0.1); border-color: rgba(0, 200, 150, 0.4);">Rebuild Belts</button>
    </div>
    <div class="control-group">
      <div class="group-header">Director & Overlays</div>
      <button id="freeCamBtn" class="ui-btn btn-active">Free Camera</button>
      <div style="margin-top:15px;">
        <label class="checkbox-label"><input type="checkbox" id="showLabels" checked> Floating Labels</label>
        <label class="checkbox-label"><input type="checkbox" id="showOrbits" checked> Orbit Lines (Paths)</label>
        <label class="checkbox-label"><input type="checkbox" id="showTrails" checked> Orbital Trails (History)</label>
        <label class="checkbox-label"><input type="checkbox" id="showGrid" checked> Spacetime Grid</label>
      </div>
    </div>
  </div>

  <div id="sim-container">
    <div id="loading-overlay">Intercepting NASA Satellite Imagery...</div>
    <canvas id="simulation"></canvas>
    <canvas id="overlay-canvas"></canvas>
    <div id="data-panel">
        <div id="dp-name" class="dp-title">Target</div>
        <div class="dp-row"><span class="dp-label">Dist to Sun:</span> <span id="dp-dist">--</span></div>
        <div class="dp-row"><span class="dp-label">Velocity:</span> <span id="dp-speed">--</span></div>
        <div class="dp-row"><span class="dp-label">Day Length:</span> <span id="dp-day">--</span></div>
        <div class="dp-row"><span class="dp-label">Mass:</span> <span id="dp-mass">--</span></div>
    </div>
    <div id="jpl-status">📡 JPL TELEMETRY: STANDBY</div>
    <div id="timer" class="hud-element">Jan 1, 2000</div>
    <div id="scale-readout" class="hud-element">View Width: 10.0 AU</div>
  </div>

  <div id="flight-computer" class="controls">
    <div style="font-weight:bold; color:#fff; font-size:14px; letter-spacing:2px; text-transform:uppercase; text-align:center; margin-bottom: 10px;">Flight Log</div>
    <div id="fc-content"></div>
  </div>
